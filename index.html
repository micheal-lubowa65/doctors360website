        <h1>Doctors360 — The Choice of a Healthy Nation</h1>
        <p>Doctors360 is a nonprofit medical clinic and registered NGO based in Juba, South Sudan, providing accessible, patient-centred healthcare across East Africa. Founded in 2019, we have served over 50,000 patients through clinical care, community health programs, and digital health innovation.</p>

        <h2>Our Mission</h2>
        <p>To provide accessible, trusted, and patient-centered healthcare digitally and physically across Africa.</p>

        <h2>Our Vision</h2>
        <p>A healthy nation where quality healthcare is within reach for everyone.</p>

        <h2>Medical Services</h2>
        <ul>
          <li>General Medicine — Comprehensive primary care for all ages</li>
          <li>Emergency Care — 24/7 rapid-response emergency services</li>
          <li>Cardiology — Heart care from prevention to intervention</li>
          <li>Pediatrics — Evidence-based care for children and adolescents</li>
          <li>Mental Health — Counselling, therapy, and psychiatric support</li>
          <li>Orthopedics — Bone, joint, and musculoskeletal care</li>
          <li>Ophthalmology — Full-spectrum eye care</li>
          <li>Obstetrics &amp; Gynecology — Maternal and reproductive health</li>
          <li>Radiology &amp; Imaging — Digital X-ray, ultrasound, and advanced imaging</li>
          <li>Laboratory Services — Diagnostic laboratory for blood, urine, and pathology</li>
          <li>Pharmacy Services — Prescription and over-the-counter medications</li>
          <li>Dermatology — Skin, hair, and nail care</li>
        </ul>

        <h2>Our Care Model — Four Pillars</h2>
        <ul>
          <li>Prevention &amp; Wellness — Check-ups, vaccinations, lifestyle counseling, and screenings</li>
          <li>Advanced Diagnostics — Imaging and lab services for fast, accurate results</li>
          <li>Treatment &amp; Therapy — Personalized care plans by multidisciplinary teams</li>
          <li>Follow-up &amp; Recovery — Post-treatment check-ins and referrals</li>
        </ul>

        <h2>Community Health Programs (NGO)</h2>
        <p>Beyond clinical care, Doctors360 runs community health programs across South Sudan and Uganda, including mobile clinics, health education, community health worker training, maternal and child health outreach, and emergency response.</p>

        <h2>Impact Since 2019</h2>
        <ul>
          <li>50,000+ patients served</li>
          <li>200+ community health workers trained</li>
          <li>12,000+ outreach visits per year</li>
          <li>Active in 6 counties across 3 countries</li>
          <li>30% of care provided free of charge</li>
        </ul>
